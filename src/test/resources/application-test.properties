spring.datasource.url=jdbc:h2:mem:wasac_billing_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

jwt.secret=test-secret-key-for-jwt-signing-must-be-long-enough-256bits
jwt.expiration=3600000

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@wasac.rw
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from-name=Utility Billing System

logging.level.org.springframework.security=WARN
logging.level.rw.wasac.reg.billing=INFO
