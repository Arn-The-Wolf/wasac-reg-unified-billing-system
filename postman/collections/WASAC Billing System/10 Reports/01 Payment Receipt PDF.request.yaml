$kind: http-request
name: Payment Receipt PDF
method: GET
url: '{{baseUrl}}/api/v1/reports/receipts/payments/{{paymentId}}'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Response is PDF", function () {
        pm.expect(pm.response.headers.get("Content-Type")).to.include("application/pdf");
      });
