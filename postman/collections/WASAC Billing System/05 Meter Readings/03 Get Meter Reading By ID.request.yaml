$kind: http-request
name: Get Meter Reading By ID
method: GET
url: '{{baseUrl}}/api/v1/meter-readings/{{meterReadingId}}'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Reading has id", function () {
        const json = pm.response.json();
        const data = json.data || json;
        pm.expect(data).to.have.property("id");
      });
