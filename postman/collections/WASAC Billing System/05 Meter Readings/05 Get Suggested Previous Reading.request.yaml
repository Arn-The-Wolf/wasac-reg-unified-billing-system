$kind: http-request
name: Get Suggested Previous Reading
method: GET
url: '{{baseUrl}}/api/v1/meter-readings/meter/{{meterId}}/suggested-previous'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
