$kind: http-request
name: Delete Meter Reading
method: DELETE
url: '{{baseUrl}}/api/v1/meter-readings/{{meterReadingId}}'
order: 6000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 204", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
