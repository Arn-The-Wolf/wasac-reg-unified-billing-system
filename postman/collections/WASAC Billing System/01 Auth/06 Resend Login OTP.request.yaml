$kind: http-request
name: Resend Login OTP
method: POST
url: '{{baseUrl}}/api/v1/auth/login/resend-otp'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@wasac.rw"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
