$kind: http-request
name: Verify Login OTP
method: POST
url: '{{baseUrl}}/api/v1/auth/login/verify-otp'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@wasac.rw",
      "code": "123456"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
      pm.test("Token is saved", function () {
        const json = pm.response.json();
        if (json.token || (json.data && json.data.token)) {
          const token = json.token || json.data.token;
          pm.environment.set("authToken", token);
          pm.test("Token saved to environment", function () {
            pm.expect(pm.environment.get("authToken")).to.not.be.empty;
          });
        }
      });
