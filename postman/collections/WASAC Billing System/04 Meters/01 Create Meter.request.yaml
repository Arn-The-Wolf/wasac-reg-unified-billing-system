$kind: http-request
name: Create Meter
method: POST
url: '{{baseUrl}}/api/v1/meters/'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "meterNumber": "WTR-2024-001",
      "type": "WATER",
      "installationDate": "2024-01-15",
      "status": "ACTIVE",
      "customerId": "{{customerId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 201", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      pm.test("Meter created with id", function () {
        const json = pm.response.json();
        const data = json.data || json;
        if (data && data.id) {
          pm.environment.set("meterId", data.id);
        }
        pm.expect(data).to.have.property("id");
      });
