$kind: http-request
name: Create Penalty
method: POST
url: '{{baseUrl}}/api/v1/config/penalties'
order: 8000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Late Payment Penalty",
      "percentage": 5,
      "effectiveFrom": "2024-01-01"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 201", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
