$kind: http-request
name: Create Tariff
method: POST
url: '{{baseUrl}}/api/v1/config/tariffs'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Water Flat Rate 2024",
      "tariffType": "FLAT",
      "meterType": "WATER",
      "effectiveFrom": "2024-01-01",
      "flatRate": 250,
      "tiers": []
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200 or 201", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      pm.test("Tariff created with id", function () {
        const json = pm.response.json();
        const data = json.data || json;
        if (data && data.id) {
          pm.environment.set("tariffId", data.id);
        }
        pm.expect(data).to.have.property("id");
      });
