$kind: http-request
name: Get All Tariffs
method: GET
url: '{{baseUrl}}/api/v1/config/tariffs'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
