$kind: http-request
name: Deactivate User
method: PATCH
url: '{{baseUrl}}/api/v1/users/{{userId}}/deactivate'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
