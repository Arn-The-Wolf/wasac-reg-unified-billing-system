$kind: http-request
name: Get Payments By Bill
method: GET
url: '{{baseUrl}}/api/v1/payments/bill/{{billId}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
        pm.response.to.have.status(200);
      });
